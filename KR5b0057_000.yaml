body:
  text: 一念三寶常慈𢚓願得拔度出火坑萬罪千災盡消散跛痾積逮皆能行邪魔惡鬼在獄禁百姓男女道心生五逆寃家並歡樂鑊湯變作蓮花池法界衆生口念善過去亡人隨𠇷生二念見前諸衆等努力長齊作橋梁憶此地獄三塗苦勤行布施盡燒香受戒讀經珍重禮一切過去上天堂天尊彈指告諸衆黑暗地獄早生光法界衆生勤修道一旦往生在中央三念亡人甚可憐一入壙中難見天道場建立不肯施四時八節得泥錢地獄之中受苦惱口中唱枉告皇天平生不肯修功德過去枷杻鐡杖鞭一日之中萬生死縱作六畜經數年飢寒脊破不能語年過一二穿鼻牽慈孝男女為作福五逆男女斷因緣飽食酒肉覓生業末為亡人捨一錢一旦生時多作福亡去往生三寶前四念衆生無善心謗毀三寶自沈淪雖入道場不正意稱揚說道出家人銅柱鐵床遣抱卧劒樹刀山來逼身苦痛尋師覓不得牛頭獄卒強來親鐡叉義著鑊湯裹碓搗磑磨作微塵種種苦惱常經歷直為毀謗出家人出家未必入地獄一切衆生慢道心告語蒼生諸衆等努力堅持好道心一切衆生回正念隨願往生在香林五念同學早出家愚癡重障生慧芽地獄翻作天堂樂鐡牀銅柱出蓮花一切衆生受快樂三五相伴升雲霞六時恆聞鍾磬響唯願子孫常出家身披法服化諸衆口誦靈寶斷魔邪七祖父母天堂上過去往生侍香華天尊告左玄真人曰向者說此五念為諸衆生顯說此經猶恐未解卿等十方諸真人等方便重說珍重殷勤若有衆生心中悟解一心正念護淨受持善行讀誦此經者及為存亡逺行疾病一切舉心回向彼此滅罪萬劫夢想之中常見三寶逢善知識在處受生恆值快樂若能長齊受戒晝夜六時燒香禮拜心無暫忘在生過去身懷經戒童子出家供養三寶若能建立靜堂抄寫受持裝濽韜軸宣布未聞者皆令聞見如此福德最為無量左玄真人稽首作禮上白天尊曰一切衆生癡盲耽著貪怒嗔恚心未回向或心回向乃將駿馬百匹寶車千乘及諸卧具而將布施心乃粗踈號呌不審得福如何天尊慈悲重為說之時諸衆等叩頭正念一心奉行天尊告左玄真人曰一切衆生心中不信不貴三寶經像齊戒但看在俗衆生即有貧窮下賤聾盲六疾失於相好不及人次若有衆生身欲布施心中不生信敬不貴三寶如此等輩必獲此報譬如鏡中照人清白隨其本身更無雜見黑即見黑白即見白隨其本根罪一如此汝若不信有地獄見在地獄在人身中無勞遠覓十方諸衆稽首作禮一心歸向願得見聞天尊告諸衆等我過去後若有一切衆生得吾此經受行讀誦堅持護淨及為諸人方便顯說若有衆生心中不信故汙不淨當來受罪還為六畜若有衆生能捨資財及諸寶物卧具之輩以將布施來入經像及以齊食贖生當來獲福定得生天恆居貴門劫劫代代與善因緣滅罪萬劫拔度升仙天尊告曰汝等衆生諦聽吾說五種捨施之功念念之中不離其心第一者若有衆生能自發心捨施勸助人施與法師營造經像一錢以上皆與四十萬倍報一萬以上報不可勝萬劫之中常見快樂教化一切恆為人師第二者若有衆生布施勸助持寫經書及靜堂幡花燈燭一錢以上皆與四十萬倍報一萬以上報不可勝過去生中國聰明智慧清淨具足常見三寶永無煩惱快樂無為第三者若有衆生忽發大慈之心勸助一切人布施貧窮下賤孤弱老病餓嫗嫠婦飢寒遠行寄客衆生等一錢以上皆與二十五萬倍報一萬以上報不可勝願在處托生恆得冨貴衣食自然第四者苦有衆生為過去及見存父母忽發洪願勸助一切衆生布施衆中法師童子清信男子女人一錢以上者二十萬倍報一萬以上報不可勝方便勸助令得回心一生受報願得出家久視長生恆演經教勸生善心第五者若有一切衆生能生善心憐念一切勸助布施教化屠兒休殺回心贖生口恆念道奉戒而行及獄囚産難飢寒一切蠢動五逆不孝反生慈心鉗口合舌回稱三寶永斷酒肉憐念聾盲百姓男女皆似我生布施一錢以上一十八萬倍報一萬以上報不可勝過去受生恆在三寶前天尊重告諸弟子等我說勸助布施其中有人施一之功覓萬之報布施雖多將罪對福福乃至有餘然可報之萬倍其福雖多補罪不足福無一斤計功補過罪福始知告諸男女勿更造罪福乃長為以此因緣名為萬倍一切衆等愼之愼之時諸衆等稱善稽首各禮天尊珍重而退天尊慈悲重說頌曰一切諸法本清淨常堪然報對從心起苦樂非外緣地獄與天堂分明在眼前未來甚冥昧審諦熟精研念爾一生中顛倒相引牽心不能明了結縳自縈緾冥冥何見曉悠悠如逝川倏歘紅顏滅揮霍入黃泉善惡無二法是非同一源見者生分别良由心識昏稱意天仙户違心地獄門深思自了悟乃成無上尊哀哉迷惑子正道不知存朽索馭六馬常恐有驚奔攀緣念念起為過在心猿遺形忘善惡塞兊閉諸根生死是對報諒自因爾身若然辨存殁寂滅即歸真出生乃差别入死甚平均地水火風散隨處自相親天地為大冶無意在人人計校受生理非果亦非因攝心修內行悟道不盈旬馳心向外境幽昧無涯津凡諸功德藏以讃嘆為首方便接迷津慈悲能善誘積善為福田積惡成殃咎假名本自無權變何常有顛倒不覺悟昏迷來日久怖畏於地獄煎懸生受苦吾開定水源洗除習塵垢身心既清淨永劫無灰朽昔聞持戒者忍辱生端正今得見天尊非言所歌詠八十一好明七十二相淨玉潤金剛身永劫無衰盛丹唇如欲開皓齒因斯映音聲自柔軟慈悲出本性慧源猶橐籥定心如水鏡此由持戒來證果為大聖太上洞玄靈寶往生救苦妙經
