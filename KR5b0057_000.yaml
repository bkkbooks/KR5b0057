front:
  text: 太上洞玄靈寶往生救苦妙經天尊昔遊香林園中為一切衆生宣說妙法開闡妙門爾時即有五色微妙光明從口中出其光遍照十方無極世界及無極九幽地獄之中天上地下無不光照衆中有一真人名曰法解從座而起嚴整衣冠稽首長跪上白天尊言合座諸衆前生前業積福纍功萬劫一㑹得遇天尊宣說妙法諸徒弟子稽首叩頭五體投地殷勤請法血流滿地於是天尊施大慈悲舉手彈指念諸弟子善哉善哉可念衆生殷勤珍重此法實深非是真人不能啓請吾今所以為汝等故說此因緣諦聽諦聽護淨遵奉珍重受持晝夜恭敬勿使失儀若有衆生髙心不信輕慢受持心生誹謗不生信敬心不護淨若當來世作畜生一切蠢動又及見存受生之日眉鬚墮落遍體生瘡舉身爛壞鳥栖露宿棄於人間百姓見者皆悉惡心父母妻兒肝腸斷絶如此之輩受苦之人痛當奈何並是衆生緣身自造非是他誤各各自思審而奉行法解曰不審此等罪人前生何劫受罪之根緣對何因惟願天尊曲垂慈澤喻以罪根天尊答曰此等罪人前生各有因緣劫劫代代立福造怨種種相生悉由身造十方大聖終不誤人吾今欲告汝等各自諦聽聞我說是三塗五苦之經汝等弟子切男女一念之中發心精進七日七夜菜食長齊月當十直一日之中十二時節燒香行道請諸道師建立道場然四十九燈懸諸幡蓋轉讀此經晝夜七遍七日七夜懴悔汝等諸徒弟子香火知識七祖父母過去亡人宿業罪根並得解脫若有諸人未過此經墮落地獄一聲稱揚三寶名者我即尋聲往救出離地獄即上天堂况復汝等七日七夜菜食長齊燒香然燈轉讀此經懴悔汝等一切弟子身中所有宿罪並得除滅若不懴悔罪難可除汝等弟子審諦聽之或有十方真人一切男女或為亡人或為見在又及己身或將金銀象馬車乘衣服卧具之物或捨田宅脫身上珍竒及諸雜寶勸造經像或將布施與法師以財質心就師請法轉讀經文及以受戒披心懴悔叩頭尊前聽師講說自懴己身千罪萬惱願得消滅天尊曰若有真心能發善意欲造經像當時隨其多少分數即以具辦勿留在後恐失前願與身為怨萬劫口過若有施物與齊食及與法師布施之物當即分付勿留在後心不東西與人作業若當過去必入地獄受諸苦惱身為餓鬼或作畜生縱得人身聾瞽六疾貧窮下賤或作孤兒寄他養育飢寒困苦無人憐愛半夜三更思憶號哭愁惱在心未嘗有樂或作猪狗牛羊雜獸恆被生殺以報前愆衆劫說之亦難可盡吾今告汝諸徒弟子審諦修身左玄真人稽首作禮上白天尊言願為切衆劫罪根衆生說此三塗五苦八難之經盲聾衆生齊皆仰聽聞經之者普受快樂皆悉歡喜稽首願聞天尊告曰善男子善女人等我嘗歷觀諸天及遊於地獄之中見有受罪衆生項負大枷臂掛雙杻腳著大械身負鐡錐口中銜火刀針刺背劒樹撞心惡鳥啄睛鐡犁耕舌鎔銅灌口百節火然燒鐡為丸入口喉爛鑊湯煎煮銅柱逼身或上刀山骨肉糜碎或入爐炭脂滴火然轉入寒冰傷心切骨遣卧鐵床潰爛床間變作鬼身毀形難見或在雪田之內分擘心腸鋒刃銼身血肉如泥磑作微塵揚骨聚䈥還成餓鬼牛頭舉棒獄卒擎又驅役罪人未嘗有歇輪回億劫何日得還汝等衆生努力尅己削身勤修功德汝等弟子及諸衆等各勵本心當得解脫言語未訖左玄真人又白天尊曰未審此等衆生前生前業作何罪釁行何楚毒觸何戒律衆等愚癡不自曉了唯願天尊哀愍衆等受罪之人示以所犯當使愼之勿得更造不知修建行何功德拔此罪根時諸衆等各發道心稽首天尊願聞顯說天尊告曰卿等諸衆心欲樂聞說此三塗五苦八難之經者冝各諦聽在心此經微妙不可思議衆經之中最為第一上品之中最為第一懴悔拔出過去亡人救難之中最為第一此經尊貴衆經中王向言三塗者地獄道一畜生道二餓鬼道三是名三塗五苦者抱銅柱一履刀山二循劒樹三入鑊湯四吞火食炭五是名五苦八難者夫人生得免三惡道一既得為人去女為男二即得男身六情四體貌具三六情具足得生中國四得生中國更值有道國君父母五值有道之君一生樂道慈仁善心六善心既發信道長生七既信道德逢太平帝主萬劫與三寶相遇八近曰八難三灾者征行大兵為一灾終年長病為二灾行住逢大水為三灾是名三灾五苦者一水漂溺之苦二大燔灼之苦三盜賊殺傷之苦四鬼魅著人之苦五一切毒螫觸囓痛深之苦是名五苦五濁者一見濁邪物二劫運濁日月短促三衆生濁精神不明四煩惱濁嗔恚鬬爭五命限濁短夭少亡婦兒妻子中道離別孤男孤女痛苦傷心是名五濁八行者一能身受非事不自申訴二能讓德與人三能不欲人之欲四能容物事不申理五能遠離無道之人藏身在靜處六能一心奉國心念三寶日月燒香長齊不絶供養出家人不違仁信七能不負經戒一生在俗恆不破齊勤能灑掃靜室修燈炷火救拔一切貧窮下賤産婦老病孤弱不具足衆生所見之者皆發慈心八能一生念道不謗毀出家人心無是非口恆念誦見一切蠢勤皆發慈念之心一切平等無有彼我善惡好醜與我身無異是名八行四等者一者惟慈二者惟愛三者惟善四者惟忍是名四等六塵者一耳聽宫商二眼見青黃白黑赤三鼻知香臭四身知剛柔燥濕五舌知辛酸醎苦甘六心知善惡喜怒哀樂外來曰塵內動曰情是名六情六塵六通者耳眼鼻身舌心是名六通六根共同三毒者貪淫一嗔恚二愚癡三是名三毒天尊告左玄真人曰向為一切衆生說此三塗五苦經者一切遠近皆蒙慧解並入法門左玄真人又白天尊曰一切罪根衆生今蒙天尊說罪福報對向於座下及諸弟子飢寒乏劣餓鬼畜生聞說此經皆悉曉然各自薰修不敢更造為過去亡者若在地獄之中受三塗五苦八難之愆欲救亡人其法若箇最得為先濟亡人之苦天尊告真人曰汝等欲救亡人當捨夀之時諸方覓師為亡人宣戒懴悔即為轉讀路上壙所請師為亡人燒香讃嘆懴悔資亡人及以男女緣身之資回將布施得福最深至七七日百日割减造經及像齊戒然四十九燈造四十九尺繒幡懸在長竿若不可得辦即小旙七尺造靈寶及五苦之經讀誦晝夜七遍亡人七七之內定其罪名百日之中配入五道向說此經救亡人之苦此法最為第一左玄真人又白天尊言向者三塗五苦八難之中一切衆生既聞經巳一切亡人隨願往生快樂之處可得聞否天尊告左玄真人曰一切存亡聞我說此經者當修福德隨願往生聽吾五念為存為亡誦經七遍者一切衆生及過去亡人隨願往生童子出家供養三寶法解曰今聞天尊欲說五念之文一切衆生歡喜踊躍一心樂聞天尊告左玄真人曰欲誦吾五念者長齊護淨著淨潔之衣一心請師依法受行若不如此必墮落地獄無有還期努力精進護淨受持一心奉事不敢失儀天尊告左玄真人及諸人鬼一心靜聽五念之經
